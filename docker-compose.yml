# ─── SellerGrid: Docker Compose ───
services:
  app:
    build: .
    restart: always
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/seller-grid
      - NEXTAUTH_URL=https://seller.miccell.co.za
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongodata:/data/db

volumes:
  uploads:
  mongodata:
